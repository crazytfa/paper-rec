# ================================================================
# 主题配置
# ================================================================
topics:
  # ── AI 综合（每日）────────────────────────────────────────────
  - id: ai_general
    name: "AI 综合"
    enabled: true
    schedule: daily
    top_n: 10 # 子方向多，多推几篇

    sources:
      arxiv:
        enabled: true
        categories:
          - cs.CV
          - cs.AI
          - cs.LG
          - cs.CL
          - cs.RO
          - cs.NE
        max_results: 50 # 每个分类最多拉取数量

      semantic_scholar:
        enabled: false
        venues:
          - "NeurIPS"
          - "ICLR"
          - "ICML"
          - "CVPR"
          - "ICCV"
          - "ECCV"
          - "AAAI"
          - "ACL"
          - "EMNLP"
          - "IEEE Transactions on Pattern Analysis and Machine Intelligence"
          - "Nature Machine Intelligence"
          - "Nature Computational Science"

      pubmed:
        enabled: true
        journals:
          - "Nature machine intelligence"
          - "Nature computational science"
        keywords:
          - "deep learning"
          - "large language model"
          - "foundation model"
          - "diffusion model"

    # ── 子方向关键词（用于粗筛时告知 AI 关注重点）──────────────
    # 每个子方向都会独立评分，最终综合排序
    subtopics:
      - name: "图像增强与复原"
        keywords:
          - "image super-resolution"
          - "image denoising"
          - "image enhancement"
          - "image restoration"
          - "blind image restoration"
          - "low-light enhancement"
          - "deblurring"
          - "artifact removal"
          - "perceptual quality"
          - "PSNR SSIM"

      - name: "图像生成与扩散模型"
        keywords:
          - "diffusion model"
          - "score matching"
          - "DDPM"
          - "stable diffusion"
          - "text-to-image"
          - "image generation"
          - "generative model"
          - "flow matching"
          - "consistency model"
          - "DiT"

      - name: "大语言模型"
        keywords:
          - "large language model"
          - "LLM"
          - "GPT"
          - "instruction tuning"
          - "RLHF"
          - "chain of thought"
          - "in-context learning"
          - "prompt engineering"
          - "fine-tuning"
          - "alignment"

      - name: "多模态"
        keywords:
          - "multimodal"
          - "vision language model"
          - "VLM"
          - "visual question answering"
          - "image captioning"
          - "cross-modal"
          - "CLIP"
          - "vision transformer"
          - "vision-language"
          - "MLLMs"

      - name: "Agent 与自主系统"
        keywords:
          - "agent"
          - "autonomous agent"
          - "tool use"
          - "planning"
          - "reasoning"
          - "embodied AI"
          - "robotics learning"
          - "task planning"
          - "agentic"
          - "self-improvement"

      - name: "强化学习"
        keywords:
          - "reinforcement learning"
          - "RL"
          - "policy gradient"
          - "PPO"
          - "reward model"
          - "RLHF"
          - "offline RL"
          - "model-based RL"
          - "multi-agent"
          - "Q-learning"

    coarse_model: "ep-20260305154142-mq6gw" # 改成你的实际模型名
    deep_model: "ep-20260303220820-vhmlx" # 改成你的实际模型名
    coarse_threshold: 0.60
    max_deep_analysis: 15
    context: "计算机视觉（图像增强/超分/去噪）、扩散模型图像生成、大语言模型、多模态、AI Agent、强化学习"

  # ── 生物光学（每周）──────────────────────────────────────────
  - id: bio_optics
    name: "生物光学与计算成像"
    enabled: true
    schedule: weekly
    top_n: 10

    sources:
      pubmed:
        enabled: true
        journals:
          - "Nature methods"
          - "Nature photonics"
          - "Nature communications"
          - "Nature biomedical engineering"
          - "Science"
          - "Science advances"
          - "Optica"
          - "Optics letters"
          - "Optics express"
          - "Biomedical optics express"
          - "Light, science & applications"
          - "eLife"
          - "PNAS"
          - "Cell"
          - "Optics and lasers in engineering"
          - "IEEE Transactions on Computational Imaging"
          - "IEEE Transactions on Image Processing"
        lookback_days: 7

      arxiv:
        enabled: true
        categories:
          - physics.optics
          - physics.bio-ph
          - q-bio.QM
          - eess.IV # 图像和视频处理（计算成像相关）
        max_results: 60

    keywords:
      # 荧光成像
      - "fluorescence imaging"
      - "fluorescence microscopy"
      - "STED microscopy"
      - "PALM"
      - "STORM"
      - "single molecule localization"
      - "TIRF"
      - "confocal microscopy"
      - "two-photon microscopy"
      # 自适应光学
      - "adaptive optics"
      - "wavefront correction"
      - "deformable mirror"
      - "Shack-Hartmann"
      - "aberration correction"
      # 超分辨
      - "super-resolution microscopy"
      - "structured illumination microscopy"
      - "expansion microscopy"
      - "MINFLUX"
      # 光片显微
      - "light sheet microscopy"
      - "SPIM"
      - "lattice light sheet"
      # OCT 与深层组织
      - "optical coherence tomography"
      - "multiphoton imaging"
      - "photoacoustic imaging"
      # 计算成像（新增）
      - "computational imaging"
      - "computational photography"
      - "coded aperture"
      - "compressive sensing"
      - "phase retrieval"
      - "ptychography"
      - "lensless imaging"
      - "wavefront sensing"
      - "holographic imaging"
      - "digital holography"
      - "speckle imaging"
      - "ghost imaging"
      - "single pixel imaging"
      - "event camera"
      - "neural radiance field"
      - "implicit neural representation"
      - "physics-informed neural"
      - "inverse problem"
      - "image reconstruction"
      - "tomographic reconstruction"

    # 生物光学关键词量少但杂，加一层粗筛确保精析的都是真正相关的
    coarse_model: "ep-20260305154142-mq6gw" # 改成你的实际 mini/lite 模型名
    coarse_threshold: 0.35 # 生物光学阈值稍低，避免漏掉跨学科论文
    deep_model: "ep-20260303220820-vhmlx" # 改成你的实际模型名
    max_deep_analysis: 20
    context: "生物光学成像（荧光/自适应光学/超分辨/光片显微）、计算成像（相位恢复/压缩感知/无透镜成像/数字全息）"

database:
  url: "${SUPABASE_URL}"
  key: "${SUPABASE_KEY}"

push:
  email:
    enabled: false
    to: "your@email.com"
    from: "onboarding@resend.dev"

  feishu:
    enabled: true
    webhook_url: "${FEISHU_WEBHOOK}"

schedule:
  daily_hour_beijing: 9
  weekly_weekday: 1
  weekly_hour_beijing: 9

dedup_cooldown_days: 90
summary_language: "zh"

